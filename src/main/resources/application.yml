server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mes?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost   #连接地址
      port: 6379        #连接端口
      password:         #密码（未设置则为空）
      database: 0       #数据库索引（默认0）
      lettuce:          # 使用 Lettuce 客户端（默认）
        pool:
          max-active: 8   # 最大连接数
          max-idle: 8     # 最大空闲连接
          min-idle: 0     # 最小空闲连接
          max-wait: 1000ms  # 最大等待时间

  # ===== 邮件（SMTP）配置 =====
  mail:
    host: ${SMTP_HOST:smtp.qq.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:1743477302@qq.com}
    password: ${SMTP_PASSWORD:mcaceeobvdhgcgad}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

mybatis-plus:
  # 实体类扫描包路径
  type-aliases-package: com.lei.mes.entity
  # Mapper XML 文件位置
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  configuration:
    # 开启驼峰命名转换 (数据库 user_name -> Java userName)
    map-underscore-to-camel-case: true
    # 打印 SQL 日志 (开发环境建议开启)
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete      # 全局逻辑删除字段名
      logic-delete-value: 1              # 已删除值
      logic-not-delete-value: 0          # 未删除值

jwt:
  secret: Y2hhcmdlci1tZXMtc2VjcmV0LWtleS1tdXN0LWJlLXN1ZmZpY2llbnRseS1sb25nLWZvci1zZWN1cml0eQ==  # 需要 ≥32 字符的 Base64 字符串
  access-expiration: 86400000      # 访问 Token 过期时间：24小时（毫秒）
  refresh-expiration: 604800000    # 刷新 Token 过期时间：7天（毫秒）


